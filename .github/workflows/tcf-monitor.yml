name: TCF Edmonton monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-tcf:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check TCF Edmonton page
        id: tcf_check
        continue-on-error: true
        run: |
          set +e
          python check_tcf.py 2>&1 | tee tcf-check.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Create GitHub issue notification
        if: ${{ steps.tcf_check.outputs.exit_code == '1' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Possible new TCF Edmonton slot found - ${new Date().toISOString()}`;
            const detectorOutput = require('fs').readFileSync('tcf-check.log', 'utf8').trim();
            const body = [
              'Possible new TCF Edmonton slot found. Check the website immediately.',
              '',
              'Detector output:',
              '```text',
              detectorOutput,
              '```',
              '',
              'Website: https://www.afedmonton.com/en/exams/tcf/',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Fail workflow after notification
        if: ${{ steps.tcf_check.outputs.exit_code == '1' }}
        run: |
          echo "Possible new TCF Edmonton slot found. Check the website immediately."
          exit 1

      - name: Fail workflow on monitor error
        if: ${{ steps.tcf_check.outputs.exit_code != '0' && steps.tcf_check.outputs.exit_code != '1' }}
        run: |
          echo "TCF monitor failed before it could evaluate availability."
          exit 1
